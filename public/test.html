<!DOCTYPE html>
<html><head><title>Ablefy MCP Test</title><style>body{font-family:monospace;padding:20px}h2{color:#333}.ok{color:green}.err{color:red}.warn{color:orange}pre{background:#f4f4f4;padding:10px;overflow:auto;max-height:200px;font-size:12px}</style></head>
<body><h1>Ablefy MCP v2.0 - Test Suite</h1><div id="results">Running tests...</div>
<script>
const U='/api/mcp';
const R=document.getElementById('results');
let html='';
function log(label,ok,detail){html+=`<p><b>${label}</b>: <span class="${ok?'ok':'err'}">${ok?'OK':'FAIL'}</span> - ${detail}</p>`; R.innerHTML=html;}
async function call(method,params){
  const res=await fetch(U,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({jsonrpc:'2.0',method,params,id:Date.now()})});
  return res.json();
}
async function testTool(name,args){
  try{
    const res=await call('tools/call',{name,arguments:args||{}});
    const txt=res.result?.content?.[0]?.text||'';
    if(res.error){return {ok:false,detail:'RPC error: '+JSON.stringify(res.error)};}
    if(res.result?.isError){return {ok:false,detail:'Tool error: '+txt.substring(0,200)};}
    let parsed;try{parsed=JSON.parse(txt);}catch{return {ok:false,detail:'Non-JSON: '+txt.substring(0,200)};}
    if(parsed.error){return {ok:false,detail:'API error: '+JSON.stringify(parsed).substring(0,200)};}
    return {ok:true,detail:'Keys: '+Object.keys(parsed).join(', '),data:parsed};
  }catch(e){return {ok:false,detail:'Exception: '+e.message};}
}
async function run(){
  // Test 1: Initialize
  try{const r=await call('initialize',{protocolVersion:'2025-03-26',capabilities:{},clientInfo:{name:'test',version:'1.0'}});
    log('initialize',!!r.result?.serverInfo,'serverInfo: '+JSON.stringify(r.result?.serverInfo));
  }catch(e){log('initialize',false,e.message);}

  // Test 2: tools/list
  try{const r=await call('tools/list',{});const tools=r.result?.tools||[];
    log('tools/list',tools.length>0,tools.length+' tools: '+tools.map(t=>t.name).join(', '));
  }catch(e){log('tools/list',false,e.message);}

  // Test 3-10: Individual tools
  const tests=['test-auth','list-products','list-invoices','list-publishers','list-pricing-plans','list-webhook-endpoints','list-funnels','list-affiliate-redirections'];
  for(const t of tests){const r=await testTool(t);log(t,r.ok,r.detail);}

  html+='<h2>Tests Complete</h2>';R.innerHTML=html;
}
run();
</script></body></html>
